# Docker Compose file for Testing environment
# Runs backend tests in isolated container
# Frontend tests run directly with Node in GitHub Actions (fully mocked, no dependencies needed)
# Backend tests use in-memory MongoDB (mongodb-memory-server), so no MongoDB container needed

# Name of the Docker Compose project for test environment
name: century-screening-room-test

# All services for testing

services:
  # Backend Service - Runs backend tests
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
      args:
        NODE_ENV: test

    image: century-screening-room-backend:test-v1.0
    container_name: century-screening-room-backend-test

    environment:
      - NODE_ENV=test
      # DATABASE_URI not needed - tests use mongodb-memory-server (in-memory DB)
      - LOCAL_DB_URI=mongodb://localhost:27017/movie_db_test
      - OMDB_API_KEY=${OMDB_API_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-test_secret_key_for_testing_only}
      - TOKEN_HEADER_KEY=authorization
      - DOTENV_CONFIG_QUIET=true

    # Run tests as the container command
    command: npm test

    volumes:
      # Anonymous volume for node_modules
      - /app/node_modules

    # Don't restart on failure (fail fast for CI/CD)
    restart: "no"

  # Note: Frontend tests are run directly with Node in GitHub Actions
  # (not in Docker) because they are fully mocked unit tests with no external dependencies
