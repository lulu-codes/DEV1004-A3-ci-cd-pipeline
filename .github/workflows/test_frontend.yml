# WORKFLOW FOR: Frontend Tests
# PURPOSE: Run frontend tests when called by other workflows or manually triggered
# TESTS: Runs frontend unit tests directly with Node (tests are fully mocked, no external dependencies needed)

name: Test Frontend

# Least-privilege permissions for security
permissions:
  contents: read # Read repository contents
  actions: write # Upload artifacts

on:
  workflow_call:
    # No secrets required as frontend doesn't need API keys

    # This outputs the outcome of the tests results to the workflow
    outputs:
      result:
        description: "Outcome of the frontend test job"
        value: ${{ jobs.test-frontend.outputs.result }}

  # Allow manual triggering for testing this workflow independently
  workflow_dispatch:

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.run-tests.outcome }}

    steps:
      # Downloads repo code to runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # Install dependencies
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      # Run frontend tests (fully mocked, no Docker needed)
      - name: Run Frontend Tests
        id: run-tests
        working-directory: ./frontend
        env:
          CI: true
          NODE_ENV: test
        run: npm test 2>&1 | tee ../frontend-test.log

      # Write test summary to job output
      - name: Frontend Test Results summary
        if: always()
        run: |
          echo "## Frontend test results" >> $GITHUB_STEP_SUMMARY
          echo "Full logs available in artifacts." >> $GITHUB_STEP_SUMMARY

      # Upload test logs to GitHub Actions Artifacts (stored for persistent data set to retain for 30 days)
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-logs-${{ github.run_id }}
          path: frontend-test.log
          retention-days: 30
